{% extends "base.html" %}
{% block title %}Suggestions – PlaceIQ{% endblock %}
{% block page_title %}AI Recommendations{% endblock %}
{% block page_sub %}Recommended learning platforms, courses, and certifications{% endblock %}

{% block extra_head %}
<style>
.platform-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:18px; }
.platform-card {
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:20px; transition:all .2s; cursor:pointer;
}
.platform-card:hover { border-color:var(--primary); transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.3); }
.platform-header { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.platform-icon { width:44px; height:44px; border-radius:10px; background:var(--bg3); display:flex; align-items:center; justify-content:center; font-size:20px; border:1px solid var(--border); }
