{% extends "base.html" %}
{% block title %}Project Explorer – PlaceIQ{% endblock %}
{% block page_title %}Project Suggestion Engine{% endblock %}
{% block page_sub %}Categorized project ideas to build a strong placement portfolio{% endblock %}

{% block extra_head %}
<style>
.project-sidebar { width:240px; flex-shrink:0; }
.project-main { flex:1; }
.project-flex { display:flex; gap:24px; }

.cat-list { display:flex; flex-direction:column; gap:8px; }
.cat-item {
    padding:10px 15px; background:var(--bg3); border:1px solid var(--border); border-radius:10px;
    color:var(--text2); text-decoration:none; font-size:13.5px; display:flex; align-items:center; gap:10px;
    transition:all .15s;
}
