{% extends "base.html" %}
{% block title %}Project Explorer – PlaceIQ{% endblock %}
{% block page_title %}Project Suggestion Engine{% endblock %}
{% block page_sub %}Categorized project ideas to build a strong placement portfolio{% endblock %}

{% block extra_head %}
<style>
.project-sidebar { width:240px; flex-shrink:0; }
.project-main { flex:1; }
.project-flex { display:flex; gap:24px; }

.cat-list { display:flex; flex-direction:column; gap:8px; }
.cat-item {
    padding:10px 15px; background:var(--bg3); border:1px solid var(--border); border-radius:10px;
    color:var(--text2); text-decoration:none; font-size:13.5px; display:flex; align-items:center; gap:10px;
    transition:all .15s;
}
.cat-item:hover { border-color:var(--primary); background:rgba(255,255,255,0.03); }
.cat-item.active { background:rgba(245,158,11,0.1); border-color:var(--primary); color:var(--primary); }
.cat-count { margin-left:auto; font-size:10px; opacity:0.5; font-family:var(--mono); }

.project-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(350px, 1fr)); gap:18px; }
.project-card {
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:20px; display:flex; flex-direction:column;
}
.proj-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.proj-level { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; }
.proj-title { font-size:17px; font-weight:700; color:var(--text); margin-bottom:8px; }
.proj-desc { font-size:13px; color:var(--text2); line-height:1.6; margin-bottom:16px; flex:1; }

.tech-stack { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
.tech-tag { font-size:10.5px; padding:3px 8px; background:rgba(0,0,0,0.2); color:var(--text3); border-radius:5px; border:1px solid var(--border); }
</style>
