{% extends "base.html" %}
{% block title %}Prediction Result – PlaceIQ{% endblock %}
{% block page_title %}Prediction Result{% endblock %}
{% block page_sub %}AI-powered placement analysis and recommendations{% endblock %}

{% block extra_head %}
<style>
.result-hero {
    border-radius:var(--radius-lg); padding:36px; margin-bottom:22px;
    display:flex; align-items:center; gap:36px; position:relative; overflow:hidden;
    border:1px solid var(--border);
}
.result-hero.placed {
    background:linear-gradient(135deg, rgba(52,211,153,.1), rgba(56,189,248,.06));
    border-color:rgba(52,211,153,.25);
}
.result-hero.not-placed {
    background:linear-gradient(135deg, rgba(251,113,133,.1), rgba(245,158,11,.06));
    border-color:rgba(251,113,133,.22);
}
.result-hero.medium {
    background:linear-gradient(135deg, rgba(245,158,11,.1), rgba(167,139,250,.06));
    border-color:rgba(245,158,11,.22);
}
.prob-ring { position:relative; width:150px; height:150px; flex-shrink:0; }
.prob-ring canvas { position:absolute; top:0; left:0; }
.prob-label {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    text-align:center;
}
.prob-label .prob-val { font-size:32px; font-weight:800; font-family:var(--mono); line-height:1; }
.prob-label .prob-text { font-size:11px; color:var(--text2); margin-top:3px; }
.result-info h2 { font-size:30px; font-weight:800; margin-bottom:6px; }
.result-info p { font-size:14.5px; color:var(--text2); margin-bottom:14px; }
.result-badges { display:flex; gap:8px; flex-wrap:wrap; }
.result-badge {
    padding:7px 14px; border-radius:8px; font-size:12.5px; font-weight:600;
    display:flex; align-items:center; gap:5px;
}
.rec-card {
    background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius);
    padding:14px; margin-bottom:9px; display:flex; gap:12px; align-items:flex-start;
    transition:border-color .15s;
}
.rec-card:hover { border-color:var(--border2); }
.rec-card .rec-icon { font-size:20px; flex-shrink:0; }
.rec-card .rec-priority {
    font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px;
    letter-spacing:.08em; display:inline-block; margin-bottom:5px;
}
.priority-CRITICAL { background:rgba(248,113,113,.18); color:var(--red); }
.priority-HIGH     { background:rgba(251,191,36,.18);  color:var(--yellow); }
.priority-MEDIUM   { background:rgba(245,158,11,.18);  color:var(--primary); }
.priority-LOW      { background:rgba(52,211,153,.18);  color:var(--emerald); }
