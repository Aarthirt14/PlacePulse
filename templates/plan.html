{% extends "base.html" %}
{% block title %}Career Plan – PlaceIQ{% endblock %}
{% block page_title %}Career Improvement Plan{% endblock %}
{% block page_sub %}Weekly roadmap for skill development and placement readiness{% endblock %}

{% block extra_head %}
<style>
.plan-nav { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:22px; }
.plan-nav-item {
    padding:8px 14px; background:var(--bg3); border:1px solid var(--border); border-radius:8px;
    color:var(--text2); text-decoration:none; font-size:13px; font-weight:500; transition:all .15s;
}
.plan-nav-item:hover { border-color:var(--primary); color:var(--text); }
.plan-nav-item.active { background:rgba(245,158,11,0.1); border-color:var(--primary); color:var(--primary); }

.timeline { position:relative; padding-left:30px; margin-top:20px; }
.timeline::before {
    content:''; position:absolute; left:7px; top:0; bottom:0; width:1px;
    background:var(--border2);
}
