<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Placement Intelligence{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg:        #141414;
            --bg2:       #1a1a1a;
            --bg3:       #202020;
            --card:      #1e1e1e;
            --border:    #2d2d2d;
            --border2:   #3a3a3a;
            --text:      #f0ece4;
            --text2:     #9e9889;
            --text3:     #5a5650;
            --primary:   #f59e0b;
            --primary-d: #d97706;
            --primary-glow: rgba(245,158,11,0.25);
            --rose:      #fb7185;
            --emerald:   #34d399;
            --sky:       #38bdf8;
            --violet:    #a78bfa;
            --red:       #f87171;
            --yellow:    #fbbf24;
            --font:      'Plus Jakarta Sans', sans-serif;
            --mono:      'Fira Code', monospace;
            --radius:    10px;
            --radius-lg: 16px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; }

        /* ── SIDEBAR ───────────────────────────────────────── */
        .sidebar {
            position:fixed; top:0; left:0; width:234px; height:100vh;
            background:var(--bg2);
            border-right:1px solid var(--border);
            display:flex; flex-direction:column; z-index:100;
        }
        .sidebar-logo {
            padding:22px 20px 18px;
            border-bottom:1px solid var(--border);
            display:flex; align-items:center; gap:12px;
        }
        .logo-badge {
            width:40px; height:40px; border-radius:10px;
            background:linear-gradient(135deg, #f59e0b, #fb7185);
            display:flex; align-items:center; justify-content:center;
            font-size:20px; flex-shrink:0;
            box-shadow:0 4px 14px rgba(245,158,11,0.35);
        }
        .logo-info .logo-name {
            font-size:13.5px; font-weight:800; letter-spacing:.01em; color:var(--text);
        }
        .logo-info .logo-sub { font-size:11px; color:var(--text3); margin-top:1px; }

        .nav-section { padding:14px 10px 0; }
        .nav-label {
            font-size:10px; font-weight:700; letter-spacing:.12em;
            color:var(--text3); padding:0 8px 6px; text-transform:uppercase;
        }
        .nav-item {
            display:flex; align-items:center; gap:10px;
            padding:9px 12px; border-radius:var(--radius); margin-bottom:2px;
            color:var(--text2); text-decoration:none; font-size:13.5px; font-weight:500;
            transition:all .15s ease;
        }
        .nav-item:hover { background:var(--bg3); color:var(--text); }
        .nav-item.active {
            background:rgba(245,158,11,.12);
            color:var(--primary);
            border:1px solid rgba(245,158,11,.2);
        }
        .nav-icon { font-size:15px; width:20px; text-align:center; }

        .sidebar-footer {
            margin-top:auto; padding:14px 18px;
            border-top:1px solid var(--border);
        }
        .status-badge { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text2); }
        .status-dot { width:7px; height:7px; border-radius:50%; background:var(--emerald); animation:pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

        /* ── MAIN ──────────────────────────────────────────── */
        .main { margin-left:234px; min-height:100vh; }
        .topbar {
            padding:14px 28px; border-bottom:1px solid var(--border);
            background:var(--bg2);
            display:flex; align-items:center; justify-content:space-between;
            position:sticky; top:0; z-index:50;
        }
        .page-title { font-size:17px; font-weight:700; }
        .page-sub { font-size:12px; color:var(--text2); margin-top:2px; }
        .topbar-actions { display:flex; gap:10px; }

        /* ── BUTTONS ───────────────────────────────────────── */
        .btn {
            padding:8px 18px; border-radius:var(--radius); border:none; cursor:pointer;
            font-family:var(--font); font-size:13px; font-weight:600;
            transition:all .15s ease; display:inline-flex; align-items:center; gap:6px;
            text-decoration:none;
        }
        .btn-primary {
            background:var(--primary); color:#111;
        }
        .btn-primary:hover {
            background:var(--primary-d);
            box-shadow:0 4px 18px var(--primary-glow);
            transform:translateY(-1px);
        }
        .btn-outline {
            background:transparent; color:var(--text2);
            border:1px solid var(--border2);
        }
        .btn-outline:hover { border-color:var(--primary); color:var(--primary); }
        .btn-rose { background:var(--rose); color:#fff; }
        .btn-rose:hover { filter:brightness(1.1); }
        .btn-emerald { background:var(--emerald); color:#111; }

        /* ── CONTENT ───────────────────────────────────────── */
        .content { padding:26px 28px; }

        /* ── CARDS ─────────────────────────────────────────── */
        .card {
            background:var(--card); border:1px solid var(--border);
            border-radius:var(--radius-lg); padding:22px;
        }
        .card-title {
            font-size:12.5px; font-weight:700; color:var(--text2);
            margin-bottom:16px; text-transform:uppercase; letter-spacing:.07em;
        }

        /* ── STAT GRID ─────────────────────────────────────── */
        .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:14px; margin-bottom:26px; }
        .stat-card {
            background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg);
            padding:18px; position:relative; overflow:hidden;
        }
        .stat-card::before {
            content:''; position:absolute; top:0; left:0; right:0; height:2px;
            background:var(--accent-color, var(--primary));
        }
        .stat-card .stat-icon { font-size:22px; margin-bottom:10px; display:block; }
        .stat-card .stat-value { font-size:26px; font-weight:800; font-family:var(--mono); line-height:1; }
        .stat-card .stat-label { font-size:12px; color:var(--text2); margin-top:6px; }

        /* ── GRID HELPERS ──────────────────────────────────── */
        .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
        .grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px; }

        /* ── TAGS ──────────────────────────────────────────── */
        .tag {
            display:inline-flex; align-items:center; gap:4px;
            padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600;
        }
        .tag-green  { background:rgba(52,211,153,.12); color:var(--emerald); border:1px solid rgba(52,211,153,.25); }
        .tag-red    { background:rgba(248,113,113,.12); color:var(--red);     border:1px solid rgba(248,113,113,.25); }
        .tag-yellow { background:rgba(251,191,36,.12);  color:var(--yellow);  border:1px solid rgba(251,191,36,.25); }
        .tag-blue   { background:rgba(56,189,248,.12);  color:var(--sky);     border:1px solid rgba(56,189,248,.25); }
        .tag-teal   { background:rgba(52,211,153,.12);  color:var(--emerald); border:1px solid rgba(52,211,153,.25); }
        .tag-amber  { background:rgba(245,158,11,.12);  color:var(--primary); border:1px solid rgba(245,158,11,.25); }

        /* ── TOAST ─────────────────────────────────────────── */
        #toast {
            position:fixed; bottom:22px; right:22px; z-index:999;
            padding:12px 20px; border-radius:var(--radius); background:var(--bg3);
            border:1px solid var(--border2); color:var(--text);
            font-size:13.5px; font-weight:500; box-shadow:0 8px 32px rgba(0,0,0,.5);
            transform:translateY(80px); opacity:0; transition:all .3s ease;
        }
        #toast.show { transform:translateY(0); opacity:1; }

        /* ── TABLE ─────────────────────────────────────────── */
        table { width:100%; border-collapse:collapse; font-size:13px; }
        th {
            padding:11px 15px; text-align:left; color:var(--text3);
            font-weight:700; font-size:10.5px; letter-spacing:.1em;
            text-transform:uppercase; border-bottom:1px solid var(--border);
            background:var(--bg3);
        }
        td { padding:11px 15px; border-bottom:1px solid rgba(45,45,45,.6); color:var(--text2); }
        tr:last-child td { border-bottom:none; }
        tr:hover td { background:rgba(255,255,255,.025); }

        /* ── PROGRESS ──────────────────────────────────────── */
        .progress-wrap { background:rgba(255,255,255,.06); border-radius:100px; height:5px; }
        .progress-fill { height:5px; border-radius:100px; transition:width .5s ease; }

        /* ── LOADING ───────────────────────────────────────── */
        .loading-overlay {
            position:fixed; inset:0; background:rgba(20,20,20,.88);
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            z-index:999; gap:16px;
        }
        .spinner {
            width:44px; height:44px; border:3px solid var(--border2);
            border-top-color:var(--primary); border-radius:50%;
            animation:spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* ── SCROLLBAR ─────────────────────────────────────── */
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-track { background:var(--bg); }
        ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }

        @media(max-width:768px) {
            .sidebar { transform:translateX(-100%); transition:transform .25s; }
            .main { margin-left:0; }
            .grid-2,.grid-3 { grid-template-columns:1fr; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>

<nav class="sidebar">
    <div class="sidebar-logo">
        <div class="logo-badge">🎓</div>
        <div class="logo-info">
