<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Placement Intelligence{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg:        #141414;
            --bg2:       #1a1a1a;
            --bg3:       #202020;
            --card:      #1e1e1e;
            --border:    #2d2d2d;
            --border2:   #3a3a3a;
            --text:      #f0ece4;
            --text2:     #9e9889;
            --text3:     #5a5650;
            --primary:   #f59e0b;
            --primary-d: #d97706;
            --primary-glow: rgba(245,158,11,0.25);
            --rose:      #fb7185;
            --emerald:   #34d399;
            --sky:       #38bdf8;
            --violet:    #a78bfa;
            --red:       #f87171;
            --yellow:    #fbbf24;
            --font:      'Plus Jakarta Sans', sans-serif;
            --mono:      'Fira Code', monospace;
            --radius:    10px;
            --radius-lg: 16px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; }

        /* ── SIDEBAR ───────────────────────────────────────── */
        .sidebar {
            position:fixed; top:0; left:0; width:234px; height:100vh;
            background:var(--bg2);
            border-right:1px solid var(--border);
            display:flex; flex-direction:column; z-index:100;
        }
        .sidebar-logo {
            padding:22px 20px 18px;
            border-bottom:1px solid var(--border);
            display:flex; align-items:center; gap:12px;
        }
        .logo-badge {
            width:40px; height:40px; border-radius:10px;
            background:linear-gradient(135deg, #f59e0b, #fb7185);
            display:flex; align-items:center; justify-content:center;
            font-size:20px; flex-shrink:0;
            box-shadow:0 4px 14px rgba(245,158,11,0.35);
        }
        .logo-info .logo-name {
